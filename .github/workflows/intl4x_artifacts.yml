name: package:intl4x
permissions: read-all

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # weekly

env:
    cratename: icu_capi
    release: true
    CARGO_TARGET_DIR: build/

jobs:
  generate:
    strategy:
        matrix:
          os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9
        with:
          repository: unicode-org/icu4x

      - name: Setup | Rust
        uses: ATiltedTree/setup-rust@v1
        with:
          rust-version: stable
      
      - name: Generate ${{ env.cratename }}
        run: |
          cd ffi/dart/
          cargo rustc -p ${{ env.cratename }} --crate-type=cdylib --release --target-dir build_artifacts/

      - run: tree

      - name: Upload markdown
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: lib-${{ matrix.os }}
          path: ffi/dart/build_artifacts/release/lib/